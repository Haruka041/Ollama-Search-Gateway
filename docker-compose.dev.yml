version: "3.9"

name: ${COMPOSE_PROJECT_NAME:-ollama-web-search}-dev

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-ollama-web-search}-backend-dev
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OLLAMA_NODES: ${OLLAMA_NODES:-https://ollama.com}
      LB_STRATEGY: ${LB_STRATEGY:-round-robin}
      HEALTH_PATH: ${HEALTH_PATH:-/api/tags}
      WEB_SEARCH_PATH: ${WEB_SEARCH_PATH:-/api/web_search}
      HEALTH_INTERVAL_SECONDS: ${HEALTH_INTERVAL_SECONDS:-15}
      NODE_FAILURE_THRESHOLD: ${NODE_FAILURE_THRESHOLD:-3}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      DEFAULT_KEY_RATE_LIMIT_PER_MINUTE: ${DEFAULT_KEY_RATE_LIMIT_PER_MINUTE:-60}
      ALLOW_NO_API_KEY: ${ALLOW_NO_API_KEY:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-sha256$240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      SEARX_COMPAT_USERNAME: ${SEARX_COMPAT_USERNAME:-}
      SEARX_COMPAT_PASSWORD_HASH: ${SEARX_COMPAT_PASSWORD_HASH:-}
      SEARX_COMPAT_STORE_FILE: ${SEARX_COMPAT_STORE_FILE:-searx_compat.json}
      UVICORN_LOG_LEVEL: ${UVICORN_LOG_LEVEL:-info}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level ${UVICORN_LOG_LEVEL:-info}
    volumes:
      - ./backend:/app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-net

  frontend-dev:
    build:
      context: .
      dockerfile: frontend_rebuild/Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-ollama-web-search}-frontend-dev
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port ${FRONTEND_DEV_PORT:-3000}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    volumes:
      - ./frontend_rebuild:/app
      - frontend-node-modules:/app/node_modules
    expose:
      - "${FRONTEND_DEV_PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ollama-web-search}-nginx-dev
    depends_on:
      frontend-dev:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-net

volumes:
  frontend-node-modules:

networks:
  app-net:
    driver: bridge
