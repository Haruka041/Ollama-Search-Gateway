name: Build GHCR And Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ghcr-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from commit time
        id: version
        run: |
          COMMIT_TIME="$(git show -s --date=format-local:%Y%m%d%H%M%S --format=%cd "$GITHUB_SHA")"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ollama-search-gateway"
          echo "commit_time=${COMMIT_TIME}" >> "$GITHUB_OUTPUT"
          echo "version=v${COMMIT_TIME}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Computed version: v${COMMIT_TIME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:latest
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.commit_time }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            GHCR image:
            - `${{ steps.version.outputs.image }}:latest`
            - `${{ steps.version.outputs.image }}:${{ steps.version.outputs.commit_time }}`
